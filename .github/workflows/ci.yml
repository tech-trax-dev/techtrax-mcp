name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Unit tests
        run: npm test -- --ci

      - name: Build
        run: npm run build

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      # Validates the Dockerfile builds end-to-end. Add registry login + push
      # here (docker/login-action + docker/build-push-action) when a registry
      # is provisioned.
      - name: Build image
        run: docker build -t techtrax/mcp-server:${{ github.sha }} .
